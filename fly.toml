# fly.toml app configuration file generated for jpreagan-com on 2023-10-23T15:33:32-10:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "jpreagan-com"
primary_region = "sea"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  processes = ["app"]

[checks]
  [checks.status]
    port = 3000
    type = "http"
    interval = "10s"
    timeout = "2s"
    grace_period = "5s"
    method = "GET"
    path = "/healthcheck"
    protocol = "http"
    tls_skip_verify = false
